<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Options - YouTube Live Chat Blocker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bulma/0.9.4/css/bulma.min.css">
    <style>
      body {
        padding: 30px;
        background-color: #f5f5f5;
      }
      .container {
        max-width: 600px;
        background-color: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      }
      .title {
        margin-bottom: 20px;
        border-bottom: 2px solid #202020;
        padding-bottom: 10px;
      }
      .action-buttons {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }
      #message {
        margin-top: 15px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="title is-4"><i class="fas fa-cog"></i> <span data-i18n="optionsHeader">YouTube Live Chat Blocker Options</span></h1>
      
      <div class="content">
        <p data-i18n="optionsDescription">You can export your current rule list as a JSON file, or import an existing JSON file to restore or migrate your rules.</p>
        
        <div class="action-buttons">
          <button id="exportBtn" class="button is-info">
            <span class="icon">
              <i class="fas fa-file-export"></i>
            </span>
            <span data-i18n="exportButton">Export Rules</span>
          </button>
          
          <button id="importBtn" class="button is-success">
            <span class="icon">
              <i class="fas fa-file-import"></i>
            </span>
            <span data-i18n="importButton">Import Rules</span>
          </button>
          <input type="file" id="fileInput" accept=".json" style="display: none;">
        </div>

        <div id="message" class="notification is-hidden"></div>
      </div>
    </div>
    <script src="options.js"></script>
  </body>
</html>
